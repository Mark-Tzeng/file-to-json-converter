
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File → JSON Converter | docx · xlsx · pdf</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --surface2: #1c1c28;
      --border: #2a2a3d;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --accent3: #f59e0b;
      --text: #e8e8f0;
      --muted: #6b6b8a;
      --success: #10b981;
      --error: #ef4444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 {
      width: 500px; height: 500px;
      background: rgba(124,58,237,0.12);
      top: -200px; left: -100px;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb2 {
      width: 400px; height: 400px;
      background: rgba(6,182,212,0.08);
      bottom: -150px; right: -100px;
      animation: orbFloat 15s ease-in-out infinite reverse;
    }
    @keyframes orbFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(30px) scale(1.05); }
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 56px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.35);
      color: #a78bfa;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
    }
    .badge-dot {
      width: 6px; height: 6px;
      background: #7c3aed;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    h1 .word1 { color: var(--text); }
    h1 .arrow {
      color: var(--accent);
      display: inline-block;
      animation: arrowPulse 2s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(6px); }
    }
    h1 .word2 {
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--muted);
      font-size: 16px;
      font-family: 'Space Mono', monospace;
    }
    .subtitle span { color: var(--accent2); }

    /* Drop Zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 20px;
      padding: 56px 40px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: var(--surface);
      position: relative;
      overflow: hidden;
      margin-bottom: 32px;
    }
    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(124,58,237,0.06) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124,58,237,0.05);
    }
    .drop-zone:hover::before, .drop-zone.drag-over::before {
      opacity: 1;
    }
    .drop-zone.drag-over {
      border-style: solid;
      transform: scale(1.01);
    }

    .drop-icon {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      position: relative;
    }
    .drop-icon svg {
      width: 100%; height: 100%;
      transition: transform 0.3s;
    }
    .drop-zone:hover .drop-icon svg {
      transform: translateY(-6px);
    }

    .drop-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .drop-sub {
      color: var(--muted);
      font-size: 14px;
      font-family: 'Space Mono', monospace;
      margin-bottom: 24px;
    }

    .type-tags {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .type-tag {
      padding: 6px 16px;
      border-radius: 100px;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .type-tag.docx {
      background: rgba(124,58,237,0.15);
      color: #a78bfa;
      border: 1px solid rgba(124,58,237,0.3);
    }
    .type-tag.xlsx {
      background: rgba(16,185,129,0.12);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.3);
    }
    .type-tag.pdf {
      background: rgba(239,68,68,0.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3);
    }

    input[type="file"] { display: none; }

    /* File info card */
    .file-card {
      display: none;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 24px;
      animation: slideIn 0.3s ease;
    }
    .file-card.visible { display: flex; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .file-icon-box {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .file-icon-box.docx { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .file-icon-box.xlsx { background: rgba(16,185,129,0.15); color: #34d399; }
    .file-icon-box.pdf  { background: rgba(239,68,68,0.15); color: #fca5a5; }

    .file-details { flex: 1; min-width: 0; }
    .file-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      display: flex;
    }
    .remove-btn:hover { color: var(--error); }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn {
      flex: 1;
      min-width: 140px;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      color: white;
      box-shadow: 0 4px 20px rgba(124,58,237,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(124,58,237,0.5);
    }
    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) {
      border-color: var(--accent2);
      color: var(--accent2);
    }
    .btn-secondary:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Progress */
    .progress-wrap {
      display: none;
      margin: 20px 0;
    }
    .progress-wrap.visible { display: block; }
    .progress-label {
      font-size: 13px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      height: 4px;
      background: var(--surface2);
      border-radius: 100px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 100px;
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
      background-size: 200% 100%;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Status */
    .status {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-family: 'Space Mono', monospace;
      margin: 20px 0;
      animation: slideIn 0.3s ease;
    }
    .status.visible { display: flex; }
    .status.success {
      background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.25);
      color: #34d399;
    }
    .status.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #f87171;
    }

    /* JSON Output */
    .output-section {
      display: none;
      margin-top: 32px;
    }
    .output-section.visible { display: block; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .output-label {
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .output-label::before {
      content: '';
      display: inline-block;
      width: 8px; height: 8px;
      background: var(--accent3);
      border-radius: 50%;
    }
    .output-stats {
      font-size: 12px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
    }
    .output-stats span { color: var(--accent2); }

    .json-viewer {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .json-toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .toolbar-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
    }
    .toolbar-dot:nth-child(1) { background: #ef4444; }
    .toolbar-dot:nth-child(2) { background: #f59e0b; }
    .toolbar-dot:nth-child(3) { background: #10b981; }

    pre {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: #c4c4e0;
      padding: 20px;
      overflow: auto;
      max-height: 480px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* JSON syntax highlighting */
    .json-key { color: #a78bfa; }
    .json-string { color: #34d399; }
    .json-number { color: #f59e0b; }
    .json-bool { color: #06b6d4; }
    .json-null { color: #6b6b8a; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
      color: var(--muted);
      font-size: 12px;
      font-family: 'Space Mono', monospace;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>
  <div class="glow-orb orb1"></div>
  <div class="glow-orb orb2"></div>

  <div class="container">
    <div class="header">
      <div class="badge"><div class="badge-dot"></div>Browser-side · No upload needed</div>
      <h1>
        <span class="word1">.docx / .xlsx / .pdf</span><br>
        <span class="arrow">→ </span><span class="word2">.json</span>
      </h1>
      <p class="subtitle">拖曳檔案即可轉換 · <span>完全在本地端處理</span></p>
    </div>

    <!-- Drop Zone -->
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="8" y="12" width="40" height="52" rx="6" fill="rgba(124,58,237,0.15)" stroke="rgba(124,58,237,0.4)" stroke-width="2"/>
          <rect x="20" y="8" width="40" height="52" rx="6" fill="rgba(6,182,212,0.1)" stroke="rgba(6,182,212,0.35)" stroke-width="2"/>
          <path d="M30 34 L40 24 L50 34" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M40 24 L40 48" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="drop-title">拖曳檔案到這裡，或點擊選擇</div>
      <div class="drop-sub">支援格式 → .docx · .xlsx · .pdf</div>
      <div class="type-tags">
        <span class="type-tag docx">.DOCX</span>
        <span class="type-tag xlsx">.XLSX</span>
        <span class="type-tag pdf">.PDF</span>
      </div>
      <input type="file" id="fileInput" accept=".docx,.xlsx,.pdf" />
    </div>

    <!-- File Card -->
    <div class="file-card" id="fileCard">
      <div class="file-icon-box" id="fileIconBox">DOC</div>
      <div class="file-details">
        <div class="file-name" id="fileName">-</div>
        <div class="file-size" id="fileSize">-</div>
      </div>
      <button class="remove-btn" id="removeBtn" title="移除檔案">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" id="convertBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
          <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
        </svg>
        開始轉換
      </button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        下載 JSON
      </button>
      <button class="btn btn-secondary" id="copyBtn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        複製 JSON
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label" id="progressLabel">處理中...</div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
    </div>

    <!-- Status -->
    <div class="status" id="statusMsg"></div>

    <!-- Output -->
    <div class="output-section" id="outputSection">
      <div class="divider">JSON 輸出結果</div>
      <div class="output-header">
        <div class="output-label">output.json</div>
        <div class="output-stats" id="outputStats"></div>
      </div>
      <div class="json-viewer">
        <div class="json-toolbar">
          <div class="toolbar-dot"></div>
          <div class="toolbar-dot"></div>
          <div class="toolbar-dot"></div>
        </div>
        <pre id="jsonOutput"></pre>
      </div>
    </div>
  </div>

  <script>
    let currentFile = null;
    let jsonResult = null;
    let outputFilename = 'output.json';

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileCard = document.getElementById('fileCard');
    const fileIconBox = document.getElementById('fileIconBox');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const convertBtn = document.getElementById('convertBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const copyBtn = document.getElementById('copyBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressLabel = document.getElementById('progressLabel');
    const progressFill = document.getElementById('progressFill');
    const statusMsg = document.getElementById('statusMsg');
    const outputSection = document.getElementById('outputSection');
    const jsonOutput = document.getElementById('jsonOutput');
    const outputStats = document.getElementById('outputStats');

    // Drag & drop
    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const f = e.dataTransfer.files[0];
      if (f) loadFile(f);
    });
    fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
    removeBtn.addEventListener('click', resetAll);

    function loadFile(file) {
      const ext = file.name.split('.').pop().toLowerCase();
      if (!['docx', 'xlsx', 'pdf'].includes(ext)) {
        showStatus('error', '⚠ 只支援 .docx、.xlsx 和 .pdf 格式');
        return;
      }
      currentFile = file;
      jsonResult = null;
      outputFilename = file.name.replace(/\.(docx|xlsx|pdf)$/, '.json');

      const ext2 = ext === 'docx' ? 'docx' : ext === 'xlsx' ? 'xlsx' : 'pdf';
      fileIconBox.className = `file-icon-box ${ext2}`;
      fileIconBox.textContent = ext.toUpperCase();
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileCard.classList.add('visible');
      convertBtn.disabled = false;
      downloadBtn.disabled = true;
      copyBtn.disabled = true;
      hideStatus();
      outputSection.classList.remove('visible');
    }

    convertBtn.addEventListener('click', () => { if (currentFile) convert(currentFile); });

    async function convert(file) {
      convertBtn.disabled = true;
      showProgress('讀取檔案中...', 10);

      const ext = file.name.split('.').pop().toLowerCase();
      try {
        if (ext === 'docx') {
          jsonResult = await convertDocx(file);
        } else if (ext === 'xlsx') {
          jsonResult = await convertXlsx(file);
        } else if (ext === 'pdf') {
          jsonResult = await convertPdf(file);
        }
        showProgress('格式化 JSON...', 90);
        await delay(300);
        showProgress('完成！', 100);
        await delay(400);
        hideProgress();

        const pretty = JSON.stringify(jsonResult, null, 2);
        const lineCount = pretty.split('\n').length;
        const charCount = pretty.length;
        outputStats.innerHTML = `<span>${lineCount}</span> 行 · <span>${formatBytes(charCount)}</span>`;

        jsonOutput.innerHTML = syntaxHighlight(pretty);
        outputSection.classList.add('visible');
        downloadBtn.disabled = false;
        copyBtn.disabled = false;
        showStatus('success', `✓ 轉換成功！共 ${lineCount} 行 JSON`);
        convertBtn.disabled = false;
      } catch (err) {
        hideProgress();
        showStatus('error', `✗ 轉換失敗：${err.message}`);
        convertBtn.disabled = false;
      }
    }

    async function convertDocx(file) {
      showProgress('解析 Word 文件...', 30);
      const arrayBuffer = await file.arrayBuffer();
      showProgress('提取文字與結構...', 60);
      const result = await mammoth.extractRawText({ arrayBuffer });

      // Parse text into structured JSON
      const lines = result.value.split('\n').filter(l => l.trim());
      const paragraphs = lines.map((line, idx) => ({
        index: idx,
        text: line.trim(),
        length: line.trim().length
      }));

      return {
        metadata: {
          filename: file.name,
          filesize: file.size,
          converted_at: new Date().toISOString(),
          source_format: 'docx',
          total_paragraphs: paragraphs.length,
          total_characters: result.value.length
        },
        content: {
          full_text: result.value,
          paragraphs: paragraphs
        }
      };
    }

    async function convertXlsx(file) {
      showProgress('解析 Excel 檔案...', 30);
      const arrayBuffer = await file.arrayBuffer();
      showProgress('提取工作表資料...', 55);
      const workbook = XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
      showProgress('建構 JSON 結構...', 75);

      const sheets = {};
      workbook.SheetNames.forEach(name => {
        const ws = workbook.Sheets[name];
        const jsonData = XLSX.utils.sheet_to_json(ws, { defval: null, raw: false });
        const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');

        sheets[name] = {
          rows: jsonData.length,
          columns: range.e.c - range.s.c + 1,
          data: jsonData
        };
      });

      return {
        metadata: {
          filename: file.name,
          filesize: file.size,
          converted_at: new Date().toISOString(),
          source_format: 'xlsx',
          sheet_count: workbook.SheetNames.length,
          sheet_names: workbook.SheetNames
        },
        sheets: sheets
      };
    }

    async function convertPdf(file) {
      showProgress('載入 PDF 引擎...', 15);
      // Set PDF.js worker
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      const arrayBuffer = await file.arrayBuffer();
      showProgress('解析 PDF 文件...', 30);

      const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
      const pdf = await loadingTask.promise;
      const totalPages = pdf.numPages;

      showProgress(`提取頁面內容 (共 ${totalPages} 頁)...`, 45);

      const pages = [];
      let allText = '';

      for (let i = 1; i <= totalPages; i++) {
        const pct = 45 + Math.round((i / totalPages) * 40);
        showProgress(`解析第 ${i} / ${totalPages} 頁...`, pct);

        const page = await pdf.getPage(i);
        const viewport = page.getViewport({ scale: 1 });
        const textContent = await page.getTextContent();

        // Build lines from text items
        const items = textContent.items;
        const lineMap = {};
        items.forEach(item => {
          if (!item.str) return;
          const y = Math.round(item.transform[5]);
          if (!lineMap[y]) lineMap[y] = [];
          lineMap[y].push(item.str);
        });

        const sortedYs = Object.keys(lineMap).map(Number).sort((a, b) => b - a);
        const lines = sortedYs.map(y => lineMap[y].join(' ').trim()).filter(l => l.length > 0);
        const pageText = lines.join('\n');
        allText += pageText + '\n\n';

        pages.push({
          page_number: i,
          width: Math.round(viewport.width),
          height: Math.round(viewport.height),
          text: pageText,
          lines: lines,
          line_count: lines.length,
          char_count: pageText.length
        });
      }

      showProgress('建構 JSON 結構...', 90);

      // Get PDF metadata
      const meta = await pdf.getMetadata().catch(() => ({}));
      const info = meta.info || {};

      return {
        metadata: {
          filename: file.name,
          filesize: file.size,
          converted_at: new Date().toISOString(),
          source_format: 'pdf',
          total_pages: totalPages,
          total_characters: allText.length,
          pdf_info: {
            title: info.Title || null,
            author: info.Author || null,
            subject: info.Subject || null,
            creator: info.Creator || null,
            producer: info.Producer || null,
            creation_date: info.CreationDate || null
          }
        },
        content: {
          full_text: allText.trim(),
          pages: pages
        }
      };
    }

    downloadBtn.addEventListener('click', () => {
      if (!jsonResult) return;
      const blob = new Blob([JSON.stringify(jsonResult, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = outputFilename;
      a.click();
      URL.revokeObjectURL(url);
    });

    copyBtn.addEventListener('click', async () => {
      if (!jsonResult) return;
      await navigator.clipboard.writeText(JSON.stringify(jsonResult, null, 2));
      const original = copyBtn.innerHTML;
      copyBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 已複製！`;
      setTimeout(() => { copyBtn.innerHTML = original; }, 2000);
    });

    function syntaxHighlight(json) {
      return json
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
          let cls = 'json-number';
          if (/^"/.test(match)) cls = /:$/.test(match) ? 'json-key' : 'json-string';
          else if (/true|false/.test(match)) cls = 'json-bool';
          else if (/null/.test(match)) cls = 'json-null';
          return `<span class="${cls}">${match}</span>`;
        });
    }

    function showProgress(label, pct) {
      progressWrap.classList.add('visible');
      progressLabel.textContent = label;
      progressFill.style.width = pct + '%';
    }
    function hideProgress() { progressWrap.classList.remove('visible'); }

    function showStatus(type, msg) {
      statusMsg.className = `status ${type} visible`;
      statusMsg.textContent = msg;
    }
    function hideStatus() { statusMsg.className = 'status'; }

    function resetAll() {
      currentFile = null; jsonResult = null;
      fileInput.value = '';
      fileCard.classList.remove('visible');
      convertBtn.disabled = true;
      downloadBtn.disabled = true;
      copyBtn.disabled = true;
      outputSection.classList.remove('visible');
      hideStatus(); hideProgress();
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
  </script>
